<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OASIS | Architectural Silence</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&display=swap" rel="stylesheet">
</head>
<body>
    <div id="cursor"></div>

    <section id="hero">
        <div class="video-circle"><div class="light-glimmer"></div></div>
        <h1 class="hero-title reveal">Silence, curated.</h1>
        <div class="scroll-indicator"></div>
    </section>

    <section id="weight">
        <div class="horizon-line"></div>
        <p class="quiet-text reveal">The world is loud. Your mind doesn't have to be.</p>
    </section>

    <section id="offering">
        <div class="texture-grid">
            <div class="texture-item reveal">
                <div class="texture-box" style="background: #E8E4E1;"></div>
                <p class="texture-label">Honed Limestone</p>
            </div>
            <div class="texture-item reveal">
                <div class="texture-box" style="background: #DED6CC;"></div>
                <p class="texture-label">White Oak</p>
            </div>
            <div class="texture-item reveal">
                <div class="texture-box" style="background: #D1D1D1;"></div>
                <p class="texture-label">Woven Linen</p>
            </div>
        </div>
    </section>

    <div class="spacer"></div>

    <section id="narrative">
        <div class="hero-image-container reveal">
            <div class="image-placeholder">[ A SINGLE CHAIR ]</div>
        </div>
    </section>

    <section id="cta">
        <h2 class="hero-title reveal" style="margin-bottom: 60px;">Begin your ritual.</h2>
        <div class="cta-container reveal">
            <input type="email" placeholder="Email" aria-label="Email subscription">
            <button class="arrow-btn">→</button>
        </div>
        <footer>Limited to 1,000 members globally.</footer>
    </section>

    <script src="script.js"></script>
</body>
</html>
